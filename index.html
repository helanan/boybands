<!DOCTYPE html>
<html>
<head>
  <title>Boy Bands</title>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Fredoka+One&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/semantic-ui/2.3.1/semantic.css" rel="stylesheet">
  <link href="styles.css?v=9" rel="stylesheet">
</head>
<body>
  <!-- Star -->
  <div class="css-sticker star-sticker">
    <div class="star-l star-b"></div>
    <div class="star-l star-w"></div>
    <div class="star-l star-f"></div>
  </div>

  <!-- 60s Flower -->
  <div class="css-sticker flower-sticker">
    <div class="petal fp1"></div><div class="petal fp2"></div>
    <div class="petal fp3"></div><div class="petal fp4"></div>
    <div class="petal fp5"></div><div class="petal fp6"></div>
    <div class="flower-center"></div>
  </div>

  <!-- Platform Shoe -->
  <div class="css-sticker shoe-sticker">
    <div class="shoe-upper"></div>
    <div class="shoe-sole"></div>
  </div>

  <!-- Microphone -->
  <div class="css-sticker mic-sticker">
    <div class="mic-head"></div>
    <div class="mic-grip"></div>
    <div class="mic-handle"></div>
  </div>

  <!-- Red Lips -->
  <div class="css-sticker lips-sticker">
    <div class="lips-wrap">
      <div class="lip-tl"></div>
      <div class="lip-tr"></div>
      <div class="lip-bot"></div>
    </div>
  </div>

  <!-- Smiley Face -->
  <div class="css-sticker smiley-sticker">
    <div class="smiley-face">
      <div class="smiley-eye se-l"></div>
      <div class="smiley-eye se-r"></div>
      <div class="smiley-mouth"></div>
    </div>
  </div>

  <div class="alien-sticker">
    <div class="alien-head">
      <div class="alien-antenna"></div>
      <div class="alien-eye alien-eye--left"></div>
      <div class="alien-eye alien-eye--right"></div>
      <div class="alien-mouth"></div>
    </div>
  </div>

  <div class="sticker s1">AS IF! 🙅</div>
  <div class="sticker s2">💖 4 EVER</div>
  <div class="sticker s3">OMG!</div>
  <div class="sticker s4">2 CUTE ✨</div>
  <div class="sticker s5">XOXO 💋</div>
  <div class="sticker s6">★ SO HOT ★</div>
  <div class="sticker s7">BOY CRAZY 😍</div>
  <div class="sticker s8">✨ FAB ✨</div>
  <div class="sticker s9">LUVU 4EVA</div>
  <div class="sticker s10">🌟 ICONIC</div>

  <div class="magazine-header">
    <div class="magazine-title">★ BOY BAND FEVER ★</div>
    <div class="magazine-subtitle">Your #1 Source for Boy Band Hotness!</div>
  </div>

  <div class="ui container">
    <h5>Boy Bands</h5>
    <div id="boy_bands"></div>

    <h5>🥦 Veggie Scoreboard</h5>
    <div class="chart-legend">
      <span>🥕 Carrots</span>
      <span>🥬 Kale</span>
      <span>🥒 Zucchini</span>
      <span>🥦 Broccoli</span>
      <span>🎃 Squash</span>
    </div>
    <div id="veggie-chart"></div>
  </div>
  <div id="band-modal" class="band-modal-overlay">
    <div class="trading-card-wrap">
      <div class="band-modal-content">
        <button id="modal-close" class="ui icon button modal-close-btn">
          <i class="close icon"></i>
        </button>
        <div class="card-header">
          <h3 id="modal-title"></h3>
          <span class="card-rarity">★ LEGENDARY ★</span>
        </div>
        <div class="card-img-frame">
          <img id="modal-img" src="" alt="">
        </div>
        <p id="modal-desc"></p>
        <div class="card-stats">
          <div class="card-stat">
            <span class="stat-label">Formed</span>
            <span class="stat-val" id="stat-formed"></span>
          </div>
          <div class="card-stat">
            <span class="stat-label">Members</span>
            <span class="stat-val" id="stat-members"></span>
          </div>
          <div class="card-stat">
            <span class="stat-label">Origin</span>
            <span class="stat-val" id="stat-origin"></span>
          </div>
          <div class="card-stat">
            <span class="stat-label">Hit Song</span>
            <span class="stat-val" id="stat-hit"></span>
          </div>
        </div>
        <div class="card-footer">BOY BAND FEVER © 1999 &nbsp;|&nbsp; <span id="card-number"></span></div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/semantic-ui/2.3.1/semantic.js"></script>
  <script src="boyband.js"></script>
</body>
</html>
